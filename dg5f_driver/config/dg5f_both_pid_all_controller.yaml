/**/controller_manager:
  ros__parameters:
    update_rate: 300

    # 조인트별 PI 위치-제어기(출력: effort)
    lj_dg_pospid: { type: pid_controller/PidController }
    rj_dg_pospid: { type: pid_controller/PidController }
    # 상태 브로드캐스터(옵션이지만 보통 함께 사용)
    dg5f_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

