# DG5F Both Hands - Fingertip F/T Sensor Broadcaster Configuration
# This file is loaded conditionally when fingertip_sensor:=true

/**/controller_manager:
  ros__parameters:
    # Right hand fingertip F/T sensor broadcasters
    right_fingertip_1_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    right_fingertip_2_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    right_fingertip_3_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    right_fingertip_4_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    right_fingertip_5_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    # Left hand fingertip F/T sensor broadcasters
    left_fingertip_1_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    left_fingertip_2_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    left_fingertip_3_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    left_fingertip_4_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    left_fingertip_5_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

# Right hand fingertip F/T sensor broadcaster configurations
/**/right_fingertip_1_broadcaster:
  ros__parameters:
    frame_id: "right_fingertip_1"
